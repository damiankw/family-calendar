<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set up your FamilyDash - Create admin account and configure weather location">
  <meta name="theme-color" content="#1e1e2e">
  <title>Setup — FamilyDash</title>
  <link rel="stylesheet" href="/setup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="setup-container">
    <div class="setup-card">
      <div class="setup-header">
        <h1>Welcome</h1>
        <p>Let's set up your FamilyDash</p>
      </div>

      <form class="setup-form" id="setup-form" method="post" action="/api/setup/init">
        <!-- Step 1: Admin credentials -->
        <div class="form-step active" id="step-1">
          <h2>Create Admin Account</h2>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="admin" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-primary next-step" data-next="step-2">Next</button>
          </div>
        </div>

        <!-- Step 2: Weather location -->
        <div class="form-step" id="step-2">
          <h2>Weather Location</h2>
          <p class="step-hint">Where should we fetch the weather for?</p>
          <div class="form-group">
            <label for="location">City / Location</label>
            <input type="text" id="location" name="location" placeholder="Melbourne, Australia">
          </div>
          <div class="form-group">
            <label for="lat">Latitude</label>
            <input type="number" id="lat" name="lat" placeholder="-37.8136" step="0.01">
          </div>
          <div class="form-group">
            <label for="lon">Longitude</label>
            <input type="number" id="lon" name="lon" placeholder="144.9631" step="0.01">
          </div>
          <div class="form-group">
            <label for="tz">Timezone</label>
            <input type="text" id="tz" name="tz" placeholder="Australia/Melbourne">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost prev-step" data-prev="step-1">Back</button>
            <button type="submit" class="btn btn-success">Complete Setup</button>
          </div>
          <div class="status" id="setup-status"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="/setup.js"></script>
</body>
</html>
