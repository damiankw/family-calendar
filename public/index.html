<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FamilyDash - Your family dashboard with calendar, weather, birthdays, and reminders all in one place">
  <meta name="theme-color" content="#1e1e2e">
  <title>FamilyDash</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div id="local-ip-badge" class="local-ip-badge"></div>
  <div class="wallboard">

    <!-- LEFT PANEL (1/3) -->
    <aside class="left-panel">

      <section class="current-weather">
        <div class="top-summary">
          <!-- Clock & Date -->
          <section class="clock-section">
            <div class="time">
              <span id="clock-time">1:28</span><span id="clock-ampm">PM</span>
            </div>
            <div class="date" id="clock-date">Thursday, 26 February</div>
          </section>

          <div class="weather-main">
            <span class="temp" id="current-temp">—°</span>
            <i class="wi weather-icon" id="current-icon"></i>
          </div>
        </div>

        <div class="weather-details">
          <span class="detail"><i class="wi wi-strong-wind detail-icon"></i> <span id="wind-speed">—</span></span>
          <span class="detail"><i class="wi wi-humidity detail-icon"></i> <span id="humidity">—</span></span>
          <span class="detail"><i class="wi wi-sunrise detail-icon"></i> <span id="sunrise">—</span></span>
          <span class="detail"><i class="wi wi-sunset detail-icon"></i> <span id="sunset">—</span></span>
        </div>
      </section>

      <!-- Forecast -->
      <section class="forecast">
        <div class="forecast-day" id="forecast-0">
          <span class="forecast-label">TODAY</span>
          <i class="wi forecast-icon"></i>
          <span class="forecast-temps"><span class="hi">—</span> <span class="lo">—</span></span>
        </div>
        <div class="forecast-day" id="forecast-1">
          <span class="forecast-label">—</span>
          <i class="wi forecast-icon"></i>
          <span class="forecast-temps"><span class="hi">—</span> <span class="lo">—</span></span>
        </div>
        <div class="forecast-day" id="forecast-2">
          <span class="forecast-label">—</span>
          <i class="wi forecast-icon"></i>
          <span class="forecast-temps"><span class="hi">—</span> <span class="lo">—</span></span>
        </div>
        <div class="forecast-day" id="forecast-3">
          <span class="forecast-label">—</span>
          <i class="wi forecast-icon"></i>
          <span class="forecast-temps"><span class="hi">—</span> <span class="lo">—</span></span>
        </div>
        <div class="forecast-day" id="forecast-4">
          <span class="forecast-label">—</span>
          <i class="wi forecast-icon"></i>
          <span class="forecast-temps"><span class="hi">—</span> <span class="lo">—</span></span>
        </div>
      </section>

      <!-- Aurora -->
      <section class="aurora-bar" id="aurora-bar" style="display:none">
        <div class="aurora-content">
          <span class="aurora-icon" id="aurora-icon">☀</span>
          <span class="aurora-name" id="aurora-name">Aurora Borealis</span>
          <span class="aurora-badge" id="aurora-badge">—</span>
        </div>
      </section>

      <!-- Today / Tomorrow Events (desktop) — or Next 7 Days (mobile) -->
      <section class="events" id="events-section">
        <div class="events-group" data-day="0">
          <h3 class="events-heading">Today</h3>
          <ul class="events-list" id="events-today"></ul>
        </div>
        <div class="events-group" data-day="1">
          <h3 class="events-heading">Tomorrow</h3>
          <ul class="events-list" id="events-tomorrow"></ul>
        </div>
      </section>

    </aside>

    <!-- RIGHT PANEL (2/3) — Calendar -->
    <main class="right-panel">
      <div class="calendar">
        <div class="calendar-header">
          <span class="calendar-month" id="calendar-month">February 2026</span>
        </div>
        <div class="calendar-grid">
          <!-- Day-of-week headers -->
          <div class="dow">S</div>
          <div class="dow">M</div>
          <div class="dow">T</div>
          <div class="dow">W</div>
          <div class="dow">T</div>
          <div class="dow">F</div>
          <div class="dow">S</div>
          <!-- Day cells injected by JS -->
        </div>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
